<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLANTIC ESPORT | Create Tournament</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><div class="brand">ATLANTIC <span>ESPORT</span></div></div></nav>
  <main class="container section">
    <section class="card">
      <h2 class="section-title">Create Tournament</h2>
      <form class="form">
        <div>
          <label class="label" for="tourName">Name</label>
          <input id="tourName" class="input" type="text" placeholder="e.g. Atlantic Sunday Cup" />
        </div>
        <div class="inline">
          <label class="label" for="isPrivate" style="margin:0">Private Tournament</label>
          <input id="isPrivate" class="toggle" type="checkbox" />
        </div>

        <div id="privateConfig" class="card" style="display:none; padding:14px;">
          <label class="label" for="inviteCode">Invite Code</label>
          <input id="inviteCode" class="input" type="text" readonly placeholder="Auto-generated" />
          <label class="label" for="inviteLink" style="margin-top:8px;">Invite Link</label>
          <input id="inviteLink" class="input" type="text" readonly placeholder="Auto-generated" />
          <div class="btn-row"><button id="generateInvite" class="btn secondary" type="button">Generate Invite Link</button></div>
        </div>

        <button class="btn" type="button">Create</button>
      </form>
    </section>
  </main>
  <script src="./assets/app.js"></script>
</body>
</html>
