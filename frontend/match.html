<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLANTIC ESPORT | Match</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><div class="brand">ATLANTIC <span>ESPORT</span></div></div></nav>
  <main class="container section">
    <section class="card">
      <h2 style="margin-top:0;">Submit Match Result</h2>
      <form class="form">
        <div class="grid-2">
          <div><label class="label">Player 1 Score</label><input class="input" type="number" min="0" placeholder="0" /></div>
          <div><label class="label">Player 2 Score</label><input class="input" type="number" min="0" placeholder="0" /></div>
        </div>

        <div id="uploadZone" class="upload">
          <p>Drag & drop screenshot here or click to select</p>
          <input id="proofFile" class="input" type="file" />
        </div>

        <div>
          <label class="label">Match Status</label>
          <select class="select">
            <option>Pending</option>
            <option>Confirmed</option>
            <option>Disputed</option>
          </select>
        </div>

        <button class="btn" type="button">Submit Result</button>
      </form>
    </section>
  </main>
  <script src="./assets/app.js"></script>
</body>
</html>
