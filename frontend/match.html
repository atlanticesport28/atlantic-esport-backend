<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLANTIC ESPORT | Match</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><div class="brand">ATLANTIC <span>ESPORT</span></div></div></nav>
  <main class="container section">
    <section class="card">
      <h2 class="section-title">Match Submission</h2>
      <form class="form">
        <div>
          <label class="label">Submit Score</label>
          <input class="input" type="text" placeholder="e.g. 2-1" />
        </div>
        <div>
          <label class="label">Upload Screenshot</label>
          <input class="input" type="file" />
        </div>
        <div>
          <label class="label">Match Status</label>
          <select class="select">
            <option>Pending Review</option>
            <option>Approved</option>
            <option>Disputed</option>
          </select>
        </div>
        <button class="btn" type="button">Submit Result</button>
      </form>
    </section>
  </main>
</body>
</html>
