<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLANTIC ESPORT | Auth</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><div class="brand">ATLANTIC <span>ESPORT</span></div></div></nav>
  <main class="container section">
    <div class="grid-2">
      <section class="card">
        <h2 class="section-title">Login</h2>
        <form class="form">
          <div><label class="label">Email</label><input class="input" type="email" placeholder="you@team.gg" /></div>
          <div><label class="label">Password</label><input class="input" type="password" placeholder="••••••••" /></div>
          <button class="btn" type="button">Sign In</button>
        </form>
      </section>
      <section class="card">
        <h2 class="section-title">Register</h2>
        <form class="form">
          <div><label class="label">Username</label><input class="input" type="text" placeholder="PlayerTag" /></div>
          <div><label class="label">Email</label><input class="input" type="email" placeholder="you@team.gg" /></div>
          <div><label class="label">Password</label><input class="input" type="password" placeholder="Create password" /></div>
          <button class="btn secondary" type="button">Create Account</button>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
