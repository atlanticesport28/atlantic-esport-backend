<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLANTIC ESPORT | Login</title>

<body>
  <nav class="nav"><div class="container nav-inner"><div class="brand">ATLANTIC <span>ESPORT</span></div></div></nav>

      <h2>Login</h2>
      <form class="form">
        <div><label class="label">Email</label><input class="input" type="email" placeholder="you@atlantic.gg" /></div>
        <div><label class="label">Password</label><input class="input" type="password" placeholder="••••••••" /></div>
        <button class="btn" type="button">Login</button>
      </form>
      <p class="subtitle" style="margin-top:12px;">Need an account? <a class="auth-link" href="./register.html">Create account</a></p>
    </section>
  </main>

</html>
